<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シリカラグーン | 管理ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0e1a; color: #fff; font-family: sans-serif; }
  .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #0d1829; border: 1px solid rgba(76,201,240,0.2); padding: 48px; width: 360px; text-align: center; }
  .login-title { font-size: 24px; letter-spacing: 4px; color: #4cc9f0; margin-bottom: 32px; }
  .login-input { width: 100%; padding: 12px 16px; background: #0a0e1a; border: 1px solid rgba(76,201,240,0.3); color: #fff; font-size: 14px; margin-bottom: 16px; }
  .login-btn { width: 100%; padding: 14px; background: #c9a96e; color: #0a0e1a; font-size: 12px; letter-spacing: 3px; cursor: pointer; border: none; }
  .login-btn:hover { background: #e8d5a3; }
  .login-error { color: #ff6b6b; font-size: 12px; margin-top: 8px; display: none; }
  .dashboard { display: none; padding: 40px; }
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  .dash-title { font-size: 20px; letter-spacing: 4px; color: #4cc9f0; }
  .dash-logout { padding: 8px 24px; border: 1px solid rgba(76,201,240,0.3); color: #4cc9f0; background: transparent; cursor: pointer; font-size: 11px; letter-spacing: 2px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; }
  .stat-card { background: #0d1829; border: 1px solid rgba(76,201,240,0.15); padding: 32px; text-align: center; }
  .stat-num { font-size: 48px; color: #4cc9f0; line-height: 1; margin-bottom: 8px; }
  .stat-label { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
  .table-wrap { background: #0d1829; border: 1px solid rgba(76,201,240,0.15); }
  .table-title { padding: 20px 24px; border-bottom: 1px solid rgba(76,201,240,0.15); font-size: 12px; letter-spacing: 3px; color: #4cc9f0; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
  .refresh-btn { padding: 6px 16px; border: 1px solid rgba(76,201,240,0.3); color: #4cc9f0; background: transparent; cursor: pointer; font-size: 10px; letter-spacing: 2px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 24px; text-align: left; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; border-bottom: 1px solid rgba(76,201,240,0.1); }
  td { padding: 14px 24px; font-size: 14px; color: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(76,201,240,0.05); }
  tr:hover td { background: rgba(76,201,240,0.05); }
  .badge { display: inline-block; padding: 4px 12px; background: rgba(76,201,240,0.15); color: #4cc9f0; font-size: 11px; letter-spacing: 1px; }
  .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 2px; }
  .toggle-btn { background: none; border: 1px solid rgba(76,201,240,0.3); color: #4cc9f0; font-size: 11px; padding: 3px 10px; cursor: pointer; letter-spacing: 1px; }
  .toggle-btn:hover { background: rgba(76,201,240,0.1); }
  .detail-row td { padding: 0; }
  .monthly-table { width: 100%; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(76,201,240,0.1); }
  .monthly-table th { font-size: 9px; color: rgba(255,255,255,0.25); padding: 8px 32px; }
  .monthly-table td { font-size: 13px; color: rgba(255,255,255,0.55); padding: 8px 32px; border-bottom: 1px solid rgba(76,201,240,0.04); }
  .monthly-table tr:last-child td { border-bottom: none; }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login" id="loginScreen">
  <div class="login-box">
    <div class="login-title">DASHBOARD</div>
    <input class="login-input" type="password" id="passwordInput" placeholder="パスワードを入力" />
    <button class="login-btn" onclick="checkPassword()">ログイン</button>
    <div class="login-error" id="loginError">パスワードが違います</div>
  </div>
</div>

<!-- ダッシュボード -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div class="dash-title">SILICA LAGOON · 管理画面</div>
    <button class="dash-logout" onclick="logout()">ログアウト</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="totalClicks">-</div>
      <div class="stat-label">Total Clicks</div>
    <div class="stat-card">
      <div class="stat-num" id="totalOrders">-</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="totalInfluencers">-</div>
      <div class="stat-label">Influencers</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="todayClicks">-</div>
      <div class="stat-label">Today's Clicks</div>
    </div>

  <div class="table-wrap">
    <div class="table-title">
      インフルエンサー別 実績
      <button class="refresh-btn" onclick="loadData()">更新</button>
    </div>
    <div id="tableContent">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://mrcvwlaawmlfpoibxjec.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_nONkmADAMLoZ1wxUrZqwug_F_Fm08yO';
  const PASSWORD = 'Yuma0223';

  function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    if (input === PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  async function loadData() {
    document.getElementById('tableContent').innerHTML = '<div class="loading">読み込み中...</div>';

    const res = await fetch(`${SUPABASE_URL}/rest/v1/clicks?select=*&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();

    // 集計
    const today = new Date().toISOString().split('T')[0];
    const todayClicks = data.filter(d => d.created_at.startsWith(today)).length;
    const refCount = {};
    data.forEach(d => {
      refCount[d.ref] = (refCount[d.ref] || 0) + 1;
    });

   // ordersデータ取得
const resOrders = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*`, {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`
  }
});
const orders = await resOrders.json();

document.getElementById('totalClicks').textContent = data.length;
document.getElementById('totalOrders').textContent = orders.length;
document.getElementById('totalInfluencers').textContent = Object.keys(refCount).length;
document.getElementById('todayClicks').textContent = todayClicks;

    // テーブル
    const sorted = Object.entries(refCount).sort((a, b) => b[1] - a[1]);
    if (sorted.length === 0) {
      document.getElementById('tableContent').innerHTML = '<div class="loading">データがありません</div>';
      return;
    }

    const ordersByRef = {};
    const salesByRef = {};
    const monthlyByRef = {};
    orders.forEach(o => {
      if (o.status === 'completed' || o.status === 'paid') {
        const ref = o.ref;
        const month = o.created_at ? o.created_at.slice(0, 7) : 'unknown';
        ordersByRef[ref] = (ordersByRef[ref] || 0) + 1;
        salesByRef[ref] = (salesByRef[ref] || 0) + (o.amount || 0);
        if (!monthlyByRef[ref]) monthlyByRef[ref] = {};
        if (!monthlyByRef[ref][month]) monthlyByRef[ref][month] = { count: 0, amount: 0 };
        monthlyByRef[ref][month].count++;
        monthlyByRef[ref][month].amount += (o.amount || 0);
      }
    });

    let html = '<table><thead><tr><th></th><th>インフルエンサー</th><th>クリック数</th><th>購入数</th><th>売上金額</th><th>最終クリック</th></tr></thead><tbody>';
    sorted.forEach(([ref, count]) => {
      const last = data.find(d => d.ref === ref);
      const lastDate = new Date(last.created_at).toLocaleString('ja-JP');
      const purchaseCount = ordersByRef[ref] || 0;
      const salesAmount = (salesByRef[ref] || 0).toLocaleString('ja-JP');
      const safeRef = ref.replace(/[^a-zA-Z0-9_-]/g, '_');
      html += `<tr>
        <td><button class="toggle-btn" onclick="toggleMonthly('${safeRef}')">▶ 月別</button></td>
        <td><span class="badge">${ref}</span></td>
        <td>${count}</td><td>${purchaseCount}</td><td>¥${salesAmount}</td><td>${lastDate}</td>
      </tr>
      <tr class="detail-row" id="monthly-${safeRef}" style="display:none">
        <td colspan="6">${buildMonthlyTable(monthlyByRef[ref] || {})}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tableContent').innerHTML = html;
  }

  function buildMonthlyTable(monthly) {
    const months = Object.keys(monthly).sort().reverse();
    if (months.length === 0) return '<div class="loading" style="padding:16px">購入データなし</div>';
    let h = '<table class="monthly-table"><thead><tr><th>月</th><th>購入数</th><th>売上金額</th></tr></thead><tbody>';
    months.forEach(m => {
      const label = m === 'unknown' ? '不明' : m.replace('-', '年') + '月';
      h += `<tr><td>${label}</td><td>${monthly[m].count}件</td><td>¥${monthly[m].amount.toLocaleString('ja-JP')}</td></tr>`;
    });
    h += '</tbody></table>';
    return h;
  }

  function toggleMonthly(safeRef) {
    const row = document.getElementById('monthly-' + safeRef);
    const btn = row.previousElementSibling.querySelector('.toggle-btn');
    if (row.style.display === 'none') {
      row.style.display = '';
      btn.textContent = '▼ 月別';
    } else {
      row.style.display = 'none';
      btn.textContent = '▶ 月別';
    }
  }
  }
</script>
</body>
</html>
